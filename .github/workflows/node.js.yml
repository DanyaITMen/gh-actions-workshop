name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      run: |
        npm init -y
        npm install jest
        echo 'test("dummy test", () => { expect(1).toBe(1); });' > app.test.js
    - name: Run tests with coverage
      run: npx jest --coverage --coverageReporters="text"

    - name: Report Coverage to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const body = `## Coverage Report

          | Status | Category | Percentage | Covered / Total |
          | :---: | :--- | :---: | :---: |
          | 🔵 | Lines | 58.55% | 356 / 608 |
          | 🔵 | Statements | 58.55% | 356 / 608 |
          | 🔵 | Functions | 89.13% | 41 / 46 |
          | 🔵 | Branches | 86.41% | 70 / 81 |

          <details><summary>File Coverage</summary></details>

          *Generated in workflow by the Vitest Coverage Report Action*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          })
