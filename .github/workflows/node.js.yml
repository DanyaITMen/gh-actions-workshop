name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      run: |
        npm init -y
        npm install jest
        echo 'test("dummy test", () => { expect(1).toBe(1); });' > app.test.js
    - name: Run tests with coverage
      run: npx jest --coverage --coverageReporters="text"
