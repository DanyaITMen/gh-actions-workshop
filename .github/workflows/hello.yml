name: Hello World Training Workflow

on: 
  workflow_dispatch:

jobs:
  greet-and-list:
    runs-on: ubuntu-latest
    steps:
      - name: Greet the User
        run: echo "Hello World!"

      - name: List before checkout
        run: |
          ls -l

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List after checkout
        run: |
          ls -l
