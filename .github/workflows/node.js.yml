name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Prepare test environment
      run: |
        npm init -y
        npm install jest
        echo 'test("dummy test", () => { expect(1).toBe(1); });' > dummy.test.js
    - name: Run test and generate coverage
      run: npx jest dummy.test.js --coverage --coverageReporters="text"
